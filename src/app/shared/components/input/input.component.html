<div class="input-wrapper">
  @if (label()) {
    <label class="input-label">{{ label() }}</label>
  }
  <input
    class="input-field"
    [class.input-disabled]="isDisabled()"
    [value]="value()"
    [placeholder]="placeholder()"
    [disabled]="isDisabled()"
    [readOnly]="readonly()"
    (input)="onInput($event)"
  />
</div>
