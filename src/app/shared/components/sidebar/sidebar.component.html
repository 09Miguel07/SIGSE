<aside class="sidebar" [class.sidebar--collapsed]="collapsed()">

  <div class="sidebar__header">
    <button class="sidebar__toggle" (click)="toggle.emit()" title="Toggle sidebar">
      <span class="sidebar__toggle-icon">☰</span>
    </button>
    @if (!collapsed()) {
      <span class="sidebar__title">SIGSE – Sistema de Gestión</span>
    }
  </div>

  <nav class="sidebar__nav">
    @for (item of items(); track item.route) {
      <a class="sidebar__item"
         [routerLink]="item.route"
         routerLinkActive="sidebar__item--active"
         [routerLinkActiveOptions]="{ exact: item.exact ?? false }"
         [title]="collapsed() ? item.label : ''">
        @if (!collapsed()) {
          <span class="sidebar__label">{{ item.label }}</span>
        }
      </a>
    }
  </nav>

  <div class="sidebar__footer">
    <button class="sidebar__logout" (click)="logout.emit()" [title]="collapsed() ? 'Cerrar sesión' : ''">
      <span class="sidebar__logout-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor"  viewBox="0 0 256 256"><path d="M120,216a8,8,0,0,1-8,8H48a8,8,0,0,1-8-8V40a8,8,0,0,1,8-8h64a8,8,0,0,1,0,16H56V208h56A8,8,0,0,1,120,216Zm109.66-93.66-40-40a8,8,0,0,0-11.32,11.32L204.69,120H112a8,8,0,0,0,0,16h92.69l-26.35,26.34a8,8,0,0,0,11.32,11.32l40-40A8,8,0,0,0,229.66,122.34Z"></path></svg></span>
      @if (!collapsed()) {
        <span class="sidebar__label">Cerrar sesión</span>
      }
    </button>
  </div>

</aside>
